name: Release

on:
  release:
    types: [published]

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows x64
            os: windows-latest
            target: x86_64-pc-windows-msvc

          - name: Windows x86
            os: windows-latest
            target: i686-pc-windows-msvc

          - name: Linux amd64
            os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu

          - name: Linux arm64
            os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu

          - name: macOS Intel
            os: macos-13
            target: x86_64-apple-darwin

          - name: macOS Silicon
            os: macos-latest
            target: aarch64-apple-darwin

    steps:
      - uses: actions/checkout@v4

      - name: Set version from release tag
        shell: bash
        run: |
          VERSION="${{ github.event.release.tag_name }}"
          VERSION="${VERSION#v}"
          echo "Setting version to $VERSION"
          # Update tauri.conf.json
          cd gui/src-tauri
          sed -i'' -e "s/\"version\": \"[^\"]*\"/\"version\": \"$VERSION\"/" tauri.conf.json
          cat tauri.conf.json | grep version
          cd ../..
          # Update gui/package.json
          cd gui
          sed -i'' -e "s/\"version\": \"[^\"]*\"/\"version\": \"$VERSION\"/" package.json
          cd ..
          # Update Cargo.toml versions for gui and workspace crates
          sed -i'' -e "0,/^version = \"[^\"]*\"/s/^version = \"[^\"]*\"/version = \"$VERSION\"/" gui/src-tauri/Cargo.toml
          sed -i'' -e "0,/^version = \"[^\"]*\"/s/^version = \"[^\"]*\"/version = \"$VERSION\"/" crates/shared/Cargo.toml
          sed -i'' -e "0,/^version = \"[^\"]*\"/s/^version = \"[^\"]*\"/version = \"$VERSION\"/" crates/daemon/Cargo.toml

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            xdg-utils

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: gui/package-lock.json

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: gui/src-tauri -> target
          key: ${{ matrix.target }}

      - name: Install frontend dependencies
        working-directory: gui
        run: npm install

      - name: Build and upload to release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: gui
          releaseId: ${{ github.event.release.id }}
          args: --target ${{ matrix.target }}
